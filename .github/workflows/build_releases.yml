name: Build Multi-Platform Releases

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Android APK Build
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Recreate platform configurations
        run: flutter create --platforms=android --project-name crisis_mesh .

      - name: Install dependencies
        run: flutter pub get

      - name: Run automated unit tests
        run: flutter test

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 2. iOS Build (Unsigned archive)
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Regenerate iOS platform files
        run: |
          rm -rf ios
          flutter create --platforms=ios --project-name crisis_mesh .

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS Archive without code signing
        run: flutter build ios --release --no-codesign

      - name: Upload iOS Payload
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/ios/iphoneos/Runner.app

  # 3. Windows Release Build
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Regenerate Windows platform files
        run: |
          flutter config --enable-windows-desktop
          Remove-Item -Recurse -Force windows -ErrorAction SilentlyContinue
          flutter create --platforms=windows --project-name crisis_mesh .

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-app
          path: build/windows/x64/runner/Release/

  # 4. macOS Release Build
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Regenerate macOS platform files
        run: |
          flutter config --enable-macos-desktop
          rm -rf macos
          flutter create --platforms=macos --project-name crisis_mesh .

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS App bundle
        run: flutter build macos --release --no-codesign

      - name: Upload macOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-app
          path: build/macos/Build/Products/Release/crisis_mesh.app

  # 5. Linux Release Build
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev pkg-config clang cmake ninja-build

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Regenerate Linux platform files
        run: |
          flutter config --enable-linux-desktop
          rm -rf linux
          flutter create --platforms=linux --project-name crisis_mesh .

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux Executable
        run: flutter build linux --release

      - name: Upload Linux Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-app
          path: build/linux/x64/release/bundle/
